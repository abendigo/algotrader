services:
  web:
    image: ${LIVE_IMAGE:-ghcr.io/abendigo/algotrader:latest}
    ports:
      - "3000:3000"
    volumes:
      - algotrader-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=3000
      - ORIGIN=https://algotrader.markos.games
      - DOCKER_MODE=true
      - DOCKER_NETWORK=${COMPOSE_PROJECT_NAME:-algotrader}_default
      - LIVE_IMAGE=${LIVE_IMAGE:-ghcr.io/abendigo/algotrader:latest}
      - LIVE_PORT=9400
      - DATA_VOLUME=algotrader-data
    labels:
      - traefik.enable=true
      - traefik.http.routers.algotrader.rule=Host(`algotrader.markos.games`)
      - traefik.http.routers.algotrader.entrypoints=websecure
      - traefik.http.routers.algotrader.tls.certresolver=letsencrypt
      - traefik.http.services.algotrader.loadbalancer.server.port=3000
      - traefik.docker.network=traefik_default
    networks:
      - traefik_default
      - default
    restart: unless-stopped

volumes:
  algotrader-data:

networks:
  traefik_default:
    external: true
