services:
  web:
    build: .
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=3000
      - DOCKER_MODE=true
      - DOCKER_NETWORK=${COMPOSE_PROJECT_NAME:-algotrader}_default
      - LIVE_IMAGE=${LIVE_IMAGE:-algotrader:latest}
      - LIVE_PORT=9400
      - DATA_VOLUME=${DATA_VOLUME:-./data}
    labels:
      - traefik.enable=true
      - traefik.http.routers.algotrader.rule=Host(`algotrader.markos.games`)
      - traefik.http.routers.algotrader.entrypoints=websecure
      - traefik.http.routers.algotrader.tls.certresolver=letsencrypt
      - traefik.http.services.algotrader.loadbalancer.server.port=3000
    networks:
      - traefik
      - default
    restart: unless-stopped

networks:
  traefik:
    external: true
